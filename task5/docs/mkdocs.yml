site_name: My Docs
theme:
  name: material
  features:
    - content.action.view

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra_css:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.css